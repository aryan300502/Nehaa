<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Sister</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
margin:0;
}

h1{
margin-top:40px;
font-size:35px;
}

.slideshow{
max-width:350px;
margin:auto;
margin-top:20px;
}

.slideshow img{
width:100%;
border-radius:15px;
display:none;
}

button{
margin-top:25px;
padding:15px 25px;
font-size:18px;
border:none;
background:white;
color:#ff4081;
border-radius:10px;
cursor:pointer;
}

#message{
display:none;
font-size:22px;
margin:20px;
}

</style>
</head>

<body>

<h1>Happy Birthday Darling🎂</h1>

<div class="slideshow">

<img src="VD1.jpeg" class="slide">
<img src="VD2.jpeg" class="slide">
<img src="VD3.jpeg" class="slide">
<img src="VD4.jpeg" class="slide">

</div>

<button onclick="showMessage()">Click For Surprise💖</button>

<div id="message">
Happy Birthday!
I was going to buy you a very expensive gift…..but then I remembered having me as a Cousin is already a gift😎🎁❤️<br><br>
Thank you for always supporting me<br>
May your life be full of happiness and success🌸<br><br>
Happy Birthday Babyyy❤️
</div>

<script>

let slideIndex = 0;
showSlides();

function showSlides() {

let slides = document.getElementsByClassName("slide");

for (let i = 0; i < slides.length; i++) {
slides[i].style.display = "none";
}

slideIndex++;

if (slideIndex > slides.length) {
slideIndex = 1;
}

slides[slideIndex-1].style.display = "block";

setTimeout(showSlides, 2500);
}

function showMessage(){
document.getElementById("message").style.display="block";
}

</script>

</body>
</html>
